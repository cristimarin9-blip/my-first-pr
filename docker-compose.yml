services:
  polybot:
    build: .
    container_name: polybot
    restart: unless-stopped
    volumes:
      # config + secrets. Writable so the dashboard Settings tab can save
      # changes back to them (config.yaml on save, .env on a live-mode switch).
      - ./config.yaml:/app/config.yaml
      - ./.env:/app/.env
      # persistent state: paper portfolio, seen-trades cache, threshold state, logs
      - polybot-data:/app/data
    ports:
      # Dashboard, reachable only from the host itself (use an SSH tunnel:
      #   ssh -L 8080:127.0.0.1:8080 user@server  ->  http://localhost:8080).
      # Requires web.host: 0.0.0.0 in config.yaml when running under Docker --
      # this mapping (not web.host) is what controls outside exposure.
      # For phone access prefer a VPN (e.g. Tailscale) and bind that IP here,
      # e.g. "100.x.y.z:8080:8080". Avoid a bare "8080:8080" on a public VPS:
      # Docker's published ports bypass ufw/firewalld rules.
      - "127.0.0.1:8080:8080"

volumes:
  polybot-data:
