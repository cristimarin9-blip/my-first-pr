<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#3a2470"/>
      <stop offset="100%" stop-color="#140b24"/>
    </radialGradient>
    <linearGradient id="tok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#efe6d2"/>
      <stop offset="100%" stop-color="#d0bd94"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- outer ring of player tokens -->
  <g>
    <circle cx="256" cy="256" r="150" fill="none" stroke="#4a366f" stroke-width="4"/>
    <!-- moon -->
    <path d="M300 150 a70 70 0 1 0 0 140 a55 55 0 0 1 0 -140 z" fill="#efc94c" opacity="0.9"/>
  </g>
  <!-- 8 seat tokens around the circle -->
  <g fill="url(#tok)" stroke="#8a7444" stroke-width="3">
    <circle cx="256" cy="106" r="24"/>
    <circle cx="362" cy="150" r="24"/>
    <circle cx="406" cy="256" r="24"/>
    <circle cx="362" cy="362" r="24"/>
    <circle cx="256" cy="406" r="24"/>
    <circle cx="150" cy="362" r="24"/>
    <circle cx="106" cy="256" r="24"/>
    <circle cx="150" cy="150" r="24"/>
  </g>
  <!-- clock hands in the middle -->
  <g stroke="#efc94c" stroke-width="8" stroke-linecap="round">
    <line x1="256" y1="256" x2="256" y2="196"/>
    <line x1="256" y1="256" x2="300" y2="278"/>
  </g>
  <circle cx="256" cy="256" r="12" fill="#efc94c"/>
</svg>
